<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <rect width="100%" height="100%" fill="none" />
  
  <!-- Outer Ring -->
  <circle cx="250" cy="250" r="180" fill="none" stroke="#E50914" stroke-width="12" />
  <circle cx="250" cy="250" r="150" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-dasharray="15 8" />
  
  <!-- Grid Lines -->
  <line x1="250" y1="40" x2="250" y2="460" stroke="#FFFFFF" stroke-width="2" opacity="0.3" />
  <line x1="40" y1="250" x2="460" y2="250" stroke="#FFFFFF" stroke-width="2" opacity="0.3" />
  
  <!-- Crosshairs -->
  <path d="M 250,50 L 250,90 M 250,410 L 250,450 M 50,250 L 90,250 M 410,250 L 450,250" stroke="#E50914" stroke-width="6" stroke-linecap="round" />
  
  <!-- Center Star -->
  <g transform="translate(250,250) scale(1.5)">
    <!-- 4 Point Star -->
    <path d="M 0,-40 L 10,-10 L 40,0 L 10,10 L 0,40 L -10,10 L -40,0 L -10,-10 Z" fill="#E50914" />
    <path d="M 0,-25 L 6,-6 L 25,0 L 6,6 L 0,25 L -6,6 L -25,0 L -6,-6 Z" fill="#FFFFFF" />
  </g>
  
  <!-- Text Wrapping Around Arc (Approximated as standard texts for simplicity in Canvas mapping) -->
  <text x="250" y="400" font-family="'Inter', sans-serif" font-weight="900" font-size="28" fill="#FFFFFF" text-anchor="middle" letter-spacing="4">PROJECT: DIVISION</text>
  <text x="250" y="120" font-family="'Inter', sans-serif" font-weight="900" font-size="24" fill="#E50914" text-anchor="middle" letter-spacing="6">TOKYO / SEOUL</text>
</svg>
