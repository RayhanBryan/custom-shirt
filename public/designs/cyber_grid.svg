<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <linearGradient id="cyberGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00FFFF" />
      <stop offset="50%" stop-color="#FF00FF" />
      <stop offset="100%" stop-color="#7000FF" />
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="none" />
  <!-- Neon Triangle -->
  <polygon points="250,80 420,380 80,380" fill="none" stroke="url(#cyberGrad)" stroke-width="8" stroke-linejoin="round" />
  <polygon points="250,110 390,360 110,360" fill="none" stroke="#FF00FF" stroke-width="2" opacity="0.5" />
  
  <!-- Perspective Grid lines inside triangle -->
  <g opacity="0.35" stroke="#00FFFF" stroke-width="2">
    <!-- Horizon -->
    <line x1="120" y1="300" x2="380" y2="300" />
    <line x1="140" y1="330" x2="360" y2="330" />
    <line x1="100" y1="350" x2="400" y2="350" />
    
    <!-- Vanishing lines -->
    <line x1="250" y1="200" x2="150" y2="380" />
    <line x1="250" y1="200" x2="200" y2="380" />
    <line x1="250" y1="200" x2="250" y2="380" />
    <line x1="250" y1="200" x2="300" y2="380" />
    <line x1="250" y1="200" x2="350" y2="380" />
  </g>
  
  <!-- Neon Sun / Circle -->
  <circle cx="250" cy="200" r="60" fill="none" stroke="#FF00FF" stroke-width="4" stroke-dasharray="10 5" />
  
  <!-- Abstract lines / Tech details -->
  <path d="M 50,420 L 450,420" stroke="url(#cyberGrad)" stroke-width="3" />
  <path d="M 80,430 L 420,430" stroke="#00FFFF" stroke-width="1" stroke-dasharray="20 10" />
  <text x="250" y="470" font-family="'JetBrains Mono', monospace" font-size="24" fill="#00FFFF" text-anchor="middle" letter-spacing="8">FUTURE TECH</text>
</svg>
